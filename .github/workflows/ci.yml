name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SkillX/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: SkillX/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit

      - name: Build frontend
        run: npm run build

  backend:
    name: Backend sanity
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-key
    defaults:
      run:
        working-directory: SkillX/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: SkillX/backend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit

      - name: Verify app exports health route
        run: node -e "const { app } = require('./src/app'); if (!app || typeof app.listen !== 'function') throw new Error('Express app failed to load');"

  contracts:
    name: Contract tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SkillX

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: SkillX

      - name: Test escrow contract
        run: cargo test -p escrow-contract

      - name: Test job manager contract
        run: cargo test -p job-manager-contract
